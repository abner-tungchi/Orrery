name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  verify-localization:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - run: swift test

  build-macos-arm64:
    needs: verify-localization
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build
        run: swift build -c release
      - name: Package
        run: |
          mkdir -p dist
          cp .build/release/orrery-bin dist/orrery-bin
          chmod +x dist/orrery-bin
          cp -r .build/release/orrery_OrreryThirdParty.bundle dist/
          tar -czf orrery-darwin-arm64.tar.gz -C dist .
      - uses: actions/upload-artifact@v4
        with:
          name: orrery-darwin-arm64
          path: orrery-darwin-arm64.tar.gz

  build-linux-x86_64:
    needs: verify-localization
    runs-on: ubuntu-latest
    container: swift:6.0-jammy
    steps:
      - uses: actions/checkout@v4
      - name: Build
        run: swift build -c release --static-swift-stdlib
      - name: Package tar.gz
        run: |
          mkdir -p dist
          cp .build/release/orrery-bin dist/orrery-bin
          chmod +x dist/orrery-bin
          BUNDLE=$(find .build/release -maxdepth 1 -name "*OrreryThirdParty*" -type d | head -1)
          if [ -z "$BUNDLE" ]; then
            echo "ERROR: OrreryThirdParty bundle/resources not found"; ls -la .build/release/; exit 1
          fi
          cp -r "$BUNDLE" dist/
          tar -czf orrery-linux-x86_64.tar.gz -C dist .
      - name: Package deb
        run: |
          tag="${GITHUB_REF#refs/tags/v}"
          mkdir -p deb/DEBIAN deb/usr/local/bin
          cp .build/release/orrery-bin deb/usr/local/bin/orrery-bin
          chmod +x deb/usr/local/bin/orrery-bin
          BUNDLE=$(find .build/release -maxdepth 1 -name "*OrreryThirdParty*" -type d | head -1)
          [ -n "$BUNDLE" ] && cp -r "$BUNDLE" deb/usr/local/bin/
          cat > deb/DEBIAN/control <<CTRL
          Package: orrery
          Version: ${tag}
          Architecture: amd64
          Maintainer: OffskyLab <offskylab@users.noreply.github.com>
          Depends: orrery-sync
          Provides: orbital
          Conflicts: orbital
          Replaces: orbital
          Description: Orrery — AI CLI environment manager for Claude Code, Codex, and Gemini CLI
          CTRL
          sed -i 's/^          //' deb/DEBIAN/control
          cat > deb/DEBIAN/postinst <<'POSTINST'
          #!/bin/sh
          # Remove legacy binary (< 2.4) so users can't bypass the shell function.
          rm -f /usr/local/bin/orrery
          orrery-bin setup 2>/dev/null || true
          POSTINST
          sed -i 's/^          //' deb/DEBIAN/postinst
          chmod 755 deb/DEBIAN/postinst
          dpkg-deb --build deb orrery_${tag}_amd64.deb
      - uses: actions/upload-artifact@v4
        with:
          name: orrery-linux-x86_64
          path: |
            orrery-linux-x86_64.tar.gz
            orrery_*_amd64.deb

  build-linux-arm64:
    needs: verify-localization
    runs-on: ubuntu-24.04-arm
    container: swift:6.0-jammy
    steps:
      - uses: actions/checkout@v4
      - name: Build
        run: swift build -c release --static-swift-stdlib
      - name: Package tar.gz
        run: |
          mkdir -p dist
          cp .build/release/orrery-bin dist/orrery-bin
          chmod +x dist/orrery-bin
          BUNDLE=$(find .build/release -maxdepth 1 -name "*OrreryThirdParty*" -type d | head -1)
          if [ -z "$BUNDLE" ]; then
            echo "ERROR: OrreryThirdParty bundle/resources not found"; ls -la .build/release/; exit 1
          fi
          cp -r "$BUNDLE" dist/
          tar -czf orrery-linux-arm64.tar.gz -C dist .
      - name: Package deb
        run: |
          tag="${GITHUB_REF#refs/tags/v}"
          mkdir -p deb/DEBIAN deb/usr/local/bin
          cp .build/release/orrery-bin deb/usr/local/bin/orrery-bin
          chmod +x deb/usr/local/bin/orrery-bin
          BUNDLE=$(find .build/release -maxdepth 1 -name "*OrreryThirdParty*" -type d | head -1)
          [ -n "$BUNDLE" ] && cp -r "$BUNDLE" deb/usr/local/bin/
          cat > deb/DEBIAN/control <<CTRL
          Package: orrery
          Version: ${tag}
          Architecture: arm64
          Maintainer: OffskyLab <offskylab@users.noreply.github.com>
          Depends: orrery-sync
          Provides: orbital
          Conflicts: orbital
          Replaces: orbital
          Description: Orrery — AI CLI environment manager for Claude Code, Codex, and Gemini CLI
          CTRL
          sed -i 's/^          //' deb/DEBIAN/control
          cat > deb/DEBIAN/postinst <<'POSTINST'
          #!/bin/sh
          # Remove legacy binary (< 2.4) so users can't bypass the shell function.
          rm -f /usr/local/bin/orrery
          orrery-bin setup 2>/dev/null || true
          POSTINST
          sed -i 's/^          //' deb/DEBIAN/postinst
          chmod 755 deb/DEBIAN/postinst
          dpkg-deb --build deb orrery_${tag}_arm64.deb
      - uses: actions/upload-artifact@v4
        with:
          name: orrery-linux-arm64
          path: |
            orrery-linux-arm64.tar.gz
            orrery_*_arm64.deb

  release:
    needs: [build-macos-arm64, build-linux-x86_64, build-linux-arm64]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create or update release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          tag="${GITHUB_REF#refs/tags/}"
          assets=(
            artifacts/orrery-darwin-arm64/orrery-darwin-arm64.tar.gz
            artifacts/orrery-linux-x86_64/orrery-linux-x86_64.tar.gz
            artifacts/orrery-linux-x86_64/orrery_*_amd64.deb
            artifacts/orrery-linux-arm64/orrery-linux-arm64.tar.gz
            artifacts/orrery-linux-arm64/orrery_*_arm64.deb
          )
          if gh release view "$tag" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
            echo "Release $tag already exists — uploading assets with --clobber"
            gh release upload "$tag" --repo "$GITHUB_REPOSITORY" --clobber "${assets[@]}"
          else
            gh release create "$tag" \
              --repo "$GITHUB_REPOSITORY" \
              --title "$tag" \
              --generate-notes \
              "${assets[@]}"
          fi

  update-apt:
    needs: [release]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Checkout APT repo
        uses: actions/checkout@v4
        with:
          repository: OffskyLab/apt
          token: ${{ secrets.APT_REPO_TOKEN }}
          path: apt-repo

      - name: Update APT repo
        run: |
          # Copy deb files to pool
          cp artifacts/orrery-linux-x86_64/orrery_*_amd64.deb apt-repo/pool/main/o/orrery/
          cp artifacts/orrery-linux-arm64/orrery_*_arm64.deb apt-repo/pool/main/o/orrery/

          # Generate Packages files
          cd apt-repo
          dpkg-scanpackages --arch amd64 pool/ > dists/stable/main/binary-amd64/Packages
          dpkg-scanpackages --arch arm64 pool/ > dists/stable/main/binary-arm64/Packages
          mkdir -p dists/stable/main/binary-i386
          touch dists/stable/main/binary-i386/Packages
          gzip -kf dists/stable/main/binary-amd64/Packages
          gzip -kf dists/stable/main/binary-arm64/Packages
          gzip -kf dists/stable/main/binary-i386/Packages

          # Generate Release file
          cd dists/stable
          cat > Release <<RELEASE
          Origin: OffskyLab
          Label: Orrery
          Suite: stable
          Codename: stable
          Architectures: amd64 arm64 i386
          Components: main
          Description: APT repository for Orrery
          RELEASE
          sed -i 's/^          //' Release

          # Add checksums
          apt-ftparchive release . >> Release

      - name: Push APT repo
        run: |
          cd apt-repo
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git diff --cached --quiet || git commit -m "[UPDATE] orrery $(echo ${GITHUB_REF#refs/tags/})"
          git push
